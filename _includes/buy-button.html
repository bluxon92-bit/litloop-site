<style>
/* ── Buy banner ─────────────────────────────────────────── */
.lb-banner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  background:#F5F0E8;
  border-radius:14px;
  padding:1rem 1.25rem;
  margin:1.75rem 0;
  cursor:pointer;
  border:1.5px solid transparent;
  transition:border-color 0.15s,transform 0.15s;
  font-family:'DM Sans',system-ui,sans-serif;
  text-align:left;
  width:100%;
}
.lb-banner:hover{border-color:rgba(27,58,92,0.2);transform:translateY(-1px)}
.lb-banner:active{transform:translateY(0)}

.lb-banner-text{flex:1;min-width:0}
.lb-banner-title{font-family:'Lora',Georgia,serif;font-size:0.9375rem;font-weight:600;color:#1B3A5C;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-banner-author{font-size:0.8125rem;color:#7A7A7A;margin-top:1px}
.lb-banner-btn{
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  gap:0.4rem;
  padding:0.55rem 1.1rem;
  background:#C98A20;
  color:#fff;
  border-radius:999px;
  font-size:0.8125rem;
  font-weight:500;
  font-family:'DM Sans',system-ui,sans-serif;
  white-space:nowrap;
  box-shadow:0 4px 12px rgba(201,138,32,0.28);
  transition:background 0.15s,box-shadow 0.15s;
  border:none;
  pointer-events:none;
}
.lb-banner:hover .lb-banner-btn{background:#E5A835;box-shadow:0 6px 16px rgba(201,138,32,0.38)}

/* ── Modal overlay ──────────────────────────────────────── */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(15,37,64,0.6);z-index:9999;align-items:center;justify-content:center;padding:1rem}
.lb-overlay.open{display:flex}
.lb-modal{background:#fff;border-radius:22px;padding:1.75rem;width:360px;max-width:100%;font-family:'DM Sans',system-ui,sans-serif;box-shadow:0 24px 64px rgba(15,37,64,0.18)}
.lb-modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.lb-modal-title{margin:0 0 3px;font-family:'Lora',Georgia,serif;font-size:1.1rem;font-weight:600;color:#1B3A5C;line-height:1.25}
.lb-modal-author{font-size:0.875rem;color:#7A7A7A;margin:0}
.lb-close{background:#F5F0E8;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;color:#4A4A4A;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;margin-left:1rem}
.lb-close:hover{background:#EDE7DB}
.lb-detecting{font-size:0.8125rem;color:#7A7A7A;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.lb-detecting::before{content:'';width:8px;height:8px;border-radius:50%;background:#C98A20;animation:lb-pulse 1s ease-in-out infinite}
@keyframes lb-pulse{0%,100%{opacity:0.3}50%{opacity:1}}
.lb-region{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:500;padding:4px 10px;border-radius:999px;background:#F5F0E8;color:#1B3A5C;margin-bottom:1rem}
.lb-links{display:flex;flex-direction:column;gap:10px}
.lb-link{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1.5px solid rgba(27,58,92,0.15);border-radius:14px;text-decoration:none;color:#1B3A5C;transition:all 0.15s}
.lb-link:hover{border-color:#1B3A5C;background:#F5F0E8;transform:translateY(-1px);text-decoration:none;color:#1B3A5C}
.lb-link-name{font-size:0.9375rem;font-weight:500;color:#1B3A5C}
.lb-link-note{font-size:0.75rem;color:#7A7A7A;margin-top:1px}
.lb-link-arrow{color:#C98A20;flex-shrink:0;margin-left:0.75rem}
.lb-footer{margin-top:1.25rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center}
.lb-switch{font-size:0.75rem;color:#7A7A7A;cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;padding:0;font-family:inherit}
.lb-switch:hover{color:#1B3A5C}
.lb-aff{font-size:0.75rem;color:#C9C9C9}
</style>

<div class="lb-overlay" id="lbOverlay" role="dialog" aria-modal="true" aria-labelledby="lbModalTitle">
  <div class="lb-modal">
    <div class="lb-modal-top">
      <div>
        <p class="lb-modal-title" id="lbModalTitle"></p>
        <p class="lb-modal-author" id="lbModalAuthor"></p>
      </div>
      <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    </div>
    <div class="lb-detecting" id="lbDetecting">Detecting your region&hellip;</div>
    <div class="lb-region" id="lbRegion" style="display:none"></div>
    <div class="lb-links" id="lbLinks"></div>
    <div class="lb-footer">
      <button class="lb-switch" id="lbSwitch">Wrong region? Switch</button>
      <span class="lb-aff">affiliate links</span>
    </div>
  </div>
</div>

<script>
(function(){
  var UK_TAG='litloop-21';
  var US_TAG='ctbooks09e-20';
  var IPINFO_TOKEN='8099d12973a979';
  var book={}, region='GB';
  var regionCache=null;

  function amazonUrl(r){
    var q=encodeURIComponent(book.title+' '+book.author);
    var domain=r==='US'?'amazon.com':'amazon.co.uk';
    var tag=r==='US'?US_TAG:UK_TAG;
    return 'https://www.'+domain+'/s?k='+q+'&tag='+tag;
  }

  function render(r){
    var badge=document.getElementById('lbRegion');
    badge.textContent=r==='GB'?'🇬🇧 United Kingdom':'🇺🇸 United States';
    badge.style.display='inline-flex';
    document.getElementById('lbDetecting').style.display='none';
    document.getElementById('lbLinks').innerHTML=
      '<a class="lb-link" href="'+amazonUrl(r)+'" target="_blank" rel="noopener sponsored">'+
        '<div>'+
          '<div class="lb-link-name">Amazon '+(r==='US'?'US':'UK')+'</div>'+
          '<div class="lb-link-note">'+(r==='US'?'amazon.com':'amazon.co.uk')+'</div>'+
        '</div>'+
        '<svg class="lb-link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'+
          '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>'+
          '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'+
        '</svg>'+
      '</a>';
  }

  async function detect(){
    if(regionCache) return regionCache;
    try{
      var res=await fetch('https://api.ipinfo.io/lite/me?token='+IPINFO_TOKEN);
      var d=await res.json();
      regionCache=d.country_code==='US'?'US':'GB';
    }catch(e){ regionCache='GB'; }
    return regionCache;
  }

  async function openModal(el){
    book={
      title:el.getAttribute('data-title')||'',
      author:el.getAttribute('data-author')||''
    };
    document.getElementById('lbModalTitle').textContent=book.title;
    document.getElementById('lbModalAuthor').textContent=book.author;
    document.getElementById('lbLinks').innerHTML='';
    document.getElementById('lbDetecting').style.display='flex';
    document.getElementById('lbRegion').style.display='none';
    document.getElementById('lbOverlay').classList.add('open');
    document.body.style.overflow='hidden';
    region=await detect();
    render(region);
  }

  function closeModal(){
    document.getElementById('lbOverlay').classList.remove('open');
    document.body.style.overflow='';
  }

  document.getElementById('lbClose').addEventListener('click',closeModal);
  document.getElementById('lbOverlay').addEventListener('click',function(e){
    if(e.target===this) closeModal();
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') closeModal();
  });
  document.getElementById('lbSwitch').addEventListener('click',function(){
    region=region==='GB'?'US':'GB'; render(region);
  });
  document.addEventListener('click',function(e){
    var btn=e.target.closest('[data-buy-book]');
    if(btn) openModal(btn);
  });
})();
</script>
